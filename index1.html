<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Carbon Manga</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#050508;--bg2:#0a0a12;--bg3:#0f0f1a;--card:#10101e;
  --border:#1e1e35;--cyan:#00f5ff;--violet:#bf00ff;--pink:#ff006e;
  --gold:#ffaa00;--green:#25d366;--text:#e8e8f0;--muted:#6a6a8a;
  --fd:'Orbitron',monospace;--fb:'Rajdhani',sans-serif;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);overflow-x:hidden;}
#root{min-height:100vh;}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:9998;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);}
.header{position:sticky;top:0;z-index:200;background:rgba(5,5,8,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 1.5rem;height:62px;display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.logo{font-family:var(--fd);font-weight:900;font-size:1.1rem;letter-spacing:3px;text-transform:uppercase;cursor:pointer;white-space:nowrap;background:linear-gradient(90deg,var(--cyan),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex-shrink:0;}
.logo em{-webkit-text-fill-color:rgba(232,232,240,.35);font-style:normal;}
.header-search{flex:1;max-width:320px;position:relative;}
.search-inp{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--fb);font-size:.88rem;padding:8px 32px 8px 32px;border-radius:3px;outline:none;transition:border-color .2s;}
.search-inp:focus{border-color:rgba(0,245,255,.4);}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.82rem;pointer-events:none;}
.search-x{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:.78rem;line-height:1;}
.hnav{display:flex;align-items:center;gap:.85rem;flex-shrink:0;}
.ntab{font-family:var(--fb);font-size:.75rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 0;position:relative;transition:color .2s;white-space:nowrap;}
.ntab::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:1px;background:var(--cyan);transform:scaleX(0);transition:transform .2s;}
.ntab:hover{color:var(--text);}.ntab:hover::after,.ntab.on::after{transform:scaleX(1);}.ntab.on{color:var(--cyan);}
.cart-btn{position:relative;background:none;border:1px solid var(--border);color:var(--text);cursor:pointer;width:40px;height:40px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:border-color .2s,background .2s;}
.cart-btn:hover{border-color:var(--cyan);background:rgba(0,245,255,.05);}
.cbadge{position:absolute;top:-6px;right:-6px;background:var(--pink);color:#fff;font-family:var(--fd);font-size:.5rem;font-weight:700;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.hmbg{display:none;background:none;border:1px solid var(--border);color:var(--text);width:40px;height:40px;border-radius:4px;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;}
.mobile-nav{display:none;position:fixed;inset:0;z-index:300;background:rgba(5,5,8,.97);flex-direction:column;align-items:center;justify-content:center;gap:2rem;}
.mobile-nav.open{display:flex;}
.mobile-nav .ntab{font-size:1.1rem;letter-spacing:3px;}
.mobile-nav-close{position:absolute;top:1.5rem;right:1.5rem;background:none;border:none;color:var(--muted);font-size:1.8rem;cursor:pointer;}
.hero{padding:6rem 2rem 5rem;text-align:center;position:relative;overflow:hidden;background-size:cover;background-position:center;}
.hero::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,5,8,.75) 0%,rgba(5,5,8,.55) 50%,rgba(5,5,8,.85) 100%);pointer-events:none;z-index:0;}
.hero>*{position:relative;z-index:1;}
.hero-tag{display:inline-block;font-family:var(--fd);font-size:.58rem;letter-spacing:4px;text-transform:uppercase;color:var(--violet);border:1px solid rgba(191,0,255,.3);padding:4px 14px;border-radius:2px;margin-bottom:1.5rem;}
.hero h1{font-family:var(--fd);font-weight:900;font-size:clamp(2.5rem,6vw,5rem);line-height:1.05;margin-bottom:1rem;}
.hero h1 .l1{display:block;color:var(--text);}
.hero h1 .l2{display:block;background:linear-gradient(90deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero p{color:rgba(232,232,240,.8);font-size:1.05rem;max-width:420px;margin:0 auto 2rem;line-height:1.6;}
.cta{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:var(--fd);font-size:.68rem;letter-spacing:2px;text-transform:uppercase;padding:11px 26px;cursor:pointer;border-radius:2px;transition:background .2s,box-shadow .2s;}
.cta:hover{background:rgba(0,245,255,.08);box-shadow:0 0 20px rgba(0,245,255,.18);}
.sec{padding:2.5rem 1.5rem;max-width:1200px;margin:0 auto;}
.shead{display:flex;align-items:center;gap:1rem;margin-bottom:2rem;}
.stitle{font-family:var(--fd);font-size:.7rem;letter-spacing:4px;text-transform:uppercase;color:var(--cyan);white-space:nowrap;}
.sline{flex:1;height:1px;background:var(--border);}
.scnt{font-size:.7rem;color:var(--muted);font-family:var(--fd);white-space:nowrap;}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:1.2rem;}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:4px;overflow:hidden;transition:border-color .25s,transform .25s,box-shadow .25s;display:flex;flex-direction:column;}
.pcard:hover{border-color:rgba(0,245,255,.3);transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,245,255,.07);}
.pimg{position:relative;aspect-ratio:2/3;overflow:hidden;background:var(--bg3);}
.pimg img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.pcard:hover .pimg img{transform:scale(1.04);}
.soldout-overlay{position:absolute;inset:0;background:rgba(5,5,8,.7);display:flex;align-items:center;justify-content:center;}
.soldout-tag{font-family:var(--fd);font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:var(--pink);border:1px solid var(--pink);padding:5px 12px;}
.pbody{padding:.85rem;flex:1;display:flex;flex-direction:column;}
.pvol{font-size:.6rem;color:var(--violet);letter-spacing:2px;font-family:var(--fd);margin-bottom:3px;}
.ptitle{font-size:.92rem;font-weight:700;color:var(--text);margin-bottom:auto;line-height:1.2;}
.pfooter{display:flex;align-items:center;justify-content:space-between;margin-top:.75rem;}
.pprice{font-family:var(--fd);font-size:.9rem;color:var(--cyan);font-weight:700;}
.pstock{font-size:.63rem;color:var(--muted);}.pstock.low{color:var(--gold);}
.addbtn{width:100%;margin-top:.75rem;background:transparent;border:1px solid rgba(0,245,255,.35);color:var(--cyan);font-family:var(--fd);font-size:.58rem;letter-spacing:2px;text-transform:uppercase;padding:8px;cursor:pointer;border-radius:2px;transition:background .2s,box-shadow .2s;}
.addbtn:hover:not(:disabled){background:rgba(0,245,255,.08);box-shadow:0 0 12px rgba(0,245,255,.1);}
.addbtn:disabled{opacity:.3;cursor:not-allowed;border-color:var(--border);color:var(--muted);}
.nores{text-align:center;padding:3rem;color:var(--muted);}
.ogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:1rem;}
.ocard{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:1.35rem;position:relative;overflow:hidden;transition:transform .2s;}
.ocard:hover{transform:translateY(-3px);}
.oicon{font-size:2rem;margin-bottom:.75rem;display:block;}
.olabel{font-family:var(--fd);font-size:.53rem;letter-spacing:3px;margin-bottom:.4rem;}
.otitle{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:.4rem;}
.odesc{font-size:.84rem;color:var(--muted);line-height:1.5;}
.oglow{position:absolute;bottom:-30px;right:-30px;width:100px;height:100px;border-radius:50%;opacity:.08;pointer-events:none;}
.about-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:3rem;align-items:center;}
.about-art{aspect-ratio:1;border:1px solid var(--border);border-radius:4px;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:8rem;position:relative;overflow:hidden;}
.about-art::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse,rgba(0,245,255,.06),transparent 70%);}
.about-label{font-family:var(--fd);font-size:.58rem;letter-spacing:4px;text-transform:uppercase;color:var(--violet);margin-bottom:.75rem;}
.about-h{font-family:var(--fd);font-size:clamp(1.4rem,3vw,2rem);font-weight:900;color:var(--text);margin-bottom:1rem;line-height:1.2;}
.about-h span{color:var(--cyan);}
.about-p{color:var(--muted);font-size:1rem;line-height:1.7;margin-bottom:1rem;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1.5rem;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:1rem;text-align:center;}
.stat-v{font-family:var(--fd);font-size:1.4rem;font-weight:900;color:var(--cyan);}
.stat-l{font-size:.73rem;color:var(--muted);margin-top:3px;}
.cgrid{display:grid;grid-template-columns:1fr 1.1fr;gap:2rem;}
.cinfo{display:flex;flex-direction:column;gap:.85rem;}
.citem{display:flex;align-items:flex-start;gap:1rem;background:var(--card);border:1px solid var(--border);border-radius:4px;padding:1rem;}
.cicon2{font-size:1.3rem;flex-shrink:0;}
.clabel{font-family:var(--fd);font-size:.56rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.cval{font-size:.92rem;color:var(--text);}
.cform{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:1.5rem;}
.prof-wrap{max-width:520px;margin:0 auto;}
.prof-card{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.prof-banner{height:100px;background:linear-gradient(135deg,rgba(0,245,255,.15),rgba(191,0,255,.2));position:relative;}
.prof-av-wrap{position:absolute;bottom:-36px;left:1.5rem;}
.prof-av{width:72px;height:72px;border-radius:50%;border:3px solid var(--bg2);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-family:var(--fd);font-weight:900;color:var(--cyan);text-transform:uppercase;}
.prof-body{padding:3rem 1.5rem 1.5rem;}
.prof-name{font-family:var(--fd);font-size:1.15rem;font-weight:900;color:var(--text);}
.prof-ph{font-size:.84rem;color:var(--muted);margin-top:3px;}
.prof-since{font-size:.7rem;color:var(--violet);font-family:var(--fd);letter-spacing:1px;margin-top:6px;}
.prof-acts{display:flex;gap:.75rem;margin-top:1.25rem;}
.prof-btn{flex:1;padding:9px;background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--fd);font-size:.6rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .2s;}
.prof-btn:hover,.prof-btn.pri{border-color:var(--cyan);color:var(--cyan);background:rgba(0,245,255,.06);}
.prof-btn.danger:hover{border-color:var(--pink);color:var(--pink);background:rgba(255,0,110,.06);}
.fg{margin-bottom:1rem;}
.fl{display:block;font-size:.68rem;color:var(--muted);letter-spacing:1px;margin-bottom:5px;text-transform:uppercase;}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--fb);font-size:.9rem;padding:9px 12px;border-radius:2px;outline:none;transition:border-color .2s;}
.fi:focus{border-color:rgba(0,245,255,.4);}
textarea.fi{resize:vertical;min-height:85px;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
.ph-wrap{display:flex;}
.ph-pre{background:var(--bg3);border:1px solid var(--border);border-right:none;color:var(--muted);padding:9px 10px;border-radius:2px 0 0 2px;font-size:.88rem;font-family:var(--fd);white-space:nowrap;}
.ph-wrap .fi{border-radius:0 2px 2px 0;}
.fsub{width:100%;padding:11px;margin-top:.4rem;background:linear-gradient(135deg,rgba(0,245,255,.12),rgba(191,0,255,.12));border:1px solid rgba(0,245,255,.3);color:var(--cyan);font-family:var(--fd);font-size:.65rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:background .2s,box-shadow .2s;}
.fsub:hover{background:rgba(0,245,255,.1);box-shadow:0 0 16px rgba(0,245,255,.13);}
.fcan{width:100%;padding:9px;margin-top:6px;background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--fd);font-size:.62rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;}
.fcan:hover{border-color:var(--muted);color:var(--text);}
.wa-btn-g{width:100%;padding:11px;background:linear-gradient(135deg,#25d366,#128c7e);border:none;color:#fff;font-family:var(--fd);font-size:.65rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;display:flex;align-items:center;justify-content:center;gap:8px;}
.wa-btn-g:hover{opacity:.9;}
.cart-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s;}
.cart-ov.open{opacity:1;pointer-events:all;}
.cart-drw{position:fixed;top:0;right:0;bottom:0;width:370px;max-width:100vw;background:var(--bg2);border-left:1px solid var(--border);z-index:301;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);}
.cart-drw.open{transform:translateX(0);}
.drw-hd{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.drw-title{font-family:var(--fd);font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);}
.xbtn{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;line-height:1;}
.xbtn:hover{color:var(--text);}
.cart-list{flex:1;overflow-y:auto;padding:1rem 1.5rem;}
.cart-list::-webkit-scrollbar{width:3px;}.cart-list::-webkit-scrollbar-thumb{background:var(--border);}
.cart-empty{text-align:center;color:var(--muted);padding:3rem 0;}
.citem-row{display:flex;gap:.75rem;padding:.75rem 0;border-bottom:1px solid var(--border);}
.cimg{width:46px;height:64px;object-fit:cover;border-radius:2px;flex-shrink:0;}
.cinfo2b{flex:1;}
.cname{font-size:.87rem;font-weight:600;}
.cvol{font-size:.68rem;color:var(--violet);font-family:var(--fd);margin:2px 0;}
.cprice{font-family:var(--fd);font-size:.8rem;color:var(--cyan);}
.cqty{display:flex;align-items:center;gap:8px;margin-top:5px;}
.qbtn{width:22px;height:22px;border:1px solid var(--border);background:none;color:var(--text);cursor:pointer;border-radius:2px;font-size:.9rem;display:flex;align-items:center;justify-content:center;}
.qbtn:hover{border-color:var(--cyan);color:var(--cyan);}
.qval{font-size:.85rem;min-width:16px;text-align:center;}
.cremove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.78rem;margin-left:auto;}
.cremove:hover{color:var(--pink);}
.cart-ft{padding:1.25rem 1.5rem;border-top:1px solid var(--border);}
.cart-total-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1rem;}
.cart-tlabel{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.cart-tval{font-family:var(--fd);font-size:1.3rem;}
.order-btn{width:100%;padding:13px;background:linear-gradient(135deg,#25d366,#128c7e);border:none;color:#fff;font-family:var(--fd);font-size:.68rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:3px;display:flex;align-items:center;justify-content:center;gap:8px;}
.order-btn:hover:not(:disabled){opacity:.9;}
.order-btn:disabled{opacity:.3;cursor:not-allowed;}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:400;backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:1rem;animation:fdi .2s ease;}
@keyframes fdi{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:6px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:sui .25s ease;}
@keyframes sui{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.modal::-webkit-scrollbar{width:3px;}.modal::-webkit-scrollbar-thumb{background:var(--border);}
.mhd{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1;}
.mtitle{font-family:var(--fd);font-size:.72rem;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);}
.mbody{padding:1.5rem;}
.mlist{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:.75rem 1rem;margin-bottom:1rem;}
.mrow{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid rgba(30,30,53,.6);font-size:.88rem;}
.mrow:last-child{border-bottom:none;}
.mpr{font-family:var(--fd);font-size:.75rem;color:var(--cyan);}
.mtotal{display:flex;justify-content:space-between;align-items:baseline;padding:.75rem 1rem;background:rgba(0,245,255,.05);border:1px solid rgba(0,245,255,.15);border-radius:3px;margin-bottom:.85rem;}
.mtlabel{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.mtval{font-family:var(--fd);font-size:1.2rem;}
.mcust{display:flex;align-items:center;gap:.5rem;padding:.6rem .9rem;background:rgba(191,0,255,.07);border:1px solid rgba(191,0,255,.2);border-radius:3px;margin-bottom:.85rem;font-size:.8rem;color:var(--muted);}
.minfo-box{background:rgba(37,211,102,.05);border:1px solid rgba(37,211,102,.2);border-radius:3px;padding:.7rem .9rem;margin-bottom:1.1rem;font-size:.77rem;color:rgba(37,211,102,.85);line-height:1.6;}
.macts{display:flex;gap:.75rem;}
.mconfirm{flex:1;padding:12px;background:linear-gradient(135deg,#25d366,#128c7e);border:none;color:#fff;font-family:var(--fd);font-size:.67rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:3px;display:flex;align-items:center;justify-content:center;gap:7px;}
.mconfirm:hover{opacity:.9;}
.mback{padding:12px 16px;background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--fd);font-size:.63rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:3px;}
.mback:hover{border-color:var(--muted);color:var(--text);}
.success-modal{text-align:center;padding:2.5rem 1.5rem;}
.success-icon{font-size:4rem;margin-bottom:1rem;animation:pop .4s ease;}
@keyframes pop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
.success-title{font-family:var(--fd);font-size:1rem;font-weight:900;color:var(--cyan);letter-spacing:2px;margin-bottom:.5rem;}
.success-id{font-family:var(--fd);font-size:.65rem;color:var(--violet);letter-spacing:3px;margin-bottom:1rem;}
.success-msg{color:var(--muted);font-size:.9rem;line-height:1.6;margin-bottom:1.5rem;}
.success-steps{text-align:left;background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:1rem;margin-bottom:1.5rem;}
.step-row{display:flex;align-items:flex-start;gap:.75rem;padding:.4rem 0;font-size:.85rem;color:var(--muted);}
.step-num{background:rgba(0,245,255,.1);border:1px solid rgba(0,245,255,.2);color:var(--cyan);font-family:var(--fd);font-size:.58rem;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.success-done{width:100%;padding:11px;background:linear-gradient(135deg,rgba(0,245,255,.12),rgba(191,0,255,.12));border:1px solid rgba(0,245,255,.3);color:var(--cyan);font-family:var(--fd);font-size:.65rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;}
.admin-login{max-width:360px;margin:6rem auto;padding:0 1.5rem;}
.admin-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:2rem;}
.admin-login-title{font-family:var(--fd);font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);margin-bottom:1.5rem;}
.admin-wrap{max-width:1200px;margin:0 auto;padding:2rem 1.5rem;}
.admin-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;}
.admin-ttl{font-family:var(--fd);font-size:1.1rem;font-weight:900;color:var(--text);}
.admin-who{font-size:.76rem;color:var(--muted);}
.admin-who span{color:var(--violet);font-family:var(--fd);}
.admin-top-r{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;}
.atab{padding:7px 14px;background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--fd);font-size:.56rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .2s;}
.atab.on{border-color:var(--cyan);color:var(--cyan);background:rgba(0,245,255,.07);}
.a-logout{padding:7px 14px;background:none;border:1px solid rgba(255,0,110,.3);color:var(--pink);font-family:var(--fd);font-size:.56rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;}
.a-logout:hover{background:rgba(255,0,110,.08);}
.wa-panel{background:var(--card);border:1px solid rgba(37,211,102,.25);border-radius:4px;padding:1.25rem;margin-bottom:1.75rem;}
.wa-ptitle{font-family:var(--fd);font-size:.62rem;letter-spacing:3px;text-transform:uppercase;color:var(--green);margin-bottom:.85rem;}
.wa-cur{font-size:.82rem;color:var(--muted);margin-bottom:.75rem;}
.wa-cur span{color:var(--green);font-family:var(--fd);font-size:.75rem;}
.wa-row{display:flex;gap:.75rem;align-items:flex-end;}
.wa-row .fg{flex:1;margin-bottom:0;}
.wa-save{padding:9px 18px;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.3);color:var(--green);font-family:var(--fd);font-size:.6rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;white-space:nowrap;}
.wa-save:hover{background:rgba(37,211,102,.18);}
.agrid{display:grid;grid-template-columns:1fr 350px;gap:2rem;align-items:start;}
.atbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:4px;overflow:auto;}
.atbl{width:100%;border-collapse:collapse;min-width:400px;}
.atbl th{background:var(--bg3);padding:10px 12px;font-family:var(--fd);font-size:.56rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-align:left;border-bottom:1px solid var(--border);}
.atbl td{padding:9px 12px;border-bottom:1px solid rgba(30,30,53,.5);font-size:.86rem;vertical-align:middle;}
.atbl tr:last-child td{border-bottom:none;}
.sbadge{display:inline-block;padding:2px 8px;border-radius:2px;font-family:var(--fd);font-size:.54rem;letter-spacing:1px;}
.sbadge.in{background:rgba(0,245,255,.09);color:var(--cyan);border:1px solid rgba(0,245,255,.2);}
.sbadge.out{background:rgba(255,0,110,.09);color:var(--pink);border:1px solid rgba(255,0,110,.2);}
.ta{padding:4px 9px;border-radius:2px;font-size:.66rem;cursor:pointer;font-family:var(--fd);letter-spacing:1px;border:1px solid;margin-right:4px;background:none;}
.ta.edit{color:var(--cyan);border-color:rgba(0,245,255,.25);}.ta.edit:hover{background:rgba(0,245,255,.07);}
.ta.del{color:var(--pink);border-color:rgba(255,0,110,.25);}.ta.del:hover{background:rgba(255,0,110,.07);}
.aform{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:1.5rem;}
.ftitle{font-family:var(--fd);font-size:.66rem;letter-spacing:3px;text-transform:uppercase;color:var(--violet);margin-bottom:1.25rem;}
.itabs{display:flex;margin-bottom:.5rem;border:1px solid var(--border);border-radius:2px;overflow:hidden;}
.itab{flex:1;padding:6px;background:none;border:none;color:var(--muted);font-family:var(--fd);font-size:.56rem;letter-spacing:1px;cursor:pointer;}
.itab.on{background:rgba(0,245,255,.1);color:var(--cyan);}
.iupload{border:1px dashed var(--border);border-radius:3px;cursor:pointer;background:var(--bg3);position:relative;overflow:hidden;min-height:60px;display:flex;align-items:center;justify-content:center;}
.iupload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.iprev{width:100%;height:120px;object-fit:cover;border-radius:2px;}
.iph{color:var(--muted);font-size:.78rem;text-align:center;padding:.75rem;}
.hstats{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:1rem;margin-bottom:2rem;}
.hstat{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:1.1rem;}
.hstat-v{font-family:var(--fd);font-size:1.4rem;font-weight:900;}
.hstat-l{font-size:.7rem;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:1px;}
.h2col{display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:start;}
.ocrd{background:var(--card);border:1px solid var(--border);border-radius:4px;margin-bottom:.85rem;overflow:hidden;}
.ocrd-hd{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1rem;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:.5rem;}
.oid{font-family:var(--fd);font-size:.6rem;color:var(--violet);letter-spacing:2px;}
.otime{font-size:.72rem;color:var(--muted);}
.otbadge{font-family:var(--fd);font-size:.77rem;color:var(--cyan);background:rgba(0,245,255,.08);border:1px solid rgba(0,245,255,.2);padding:3px 10px;border-radius:2px;}
.olitems{padding:.65rem 1rem;}
.oirow{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px dashed rgba(30,30,53,.7);font-size:.83rem;}
.oirow:last-child{border-bottom:none;}
.bsrow{display:flex;align-items:center;gap:.75rem;padding:.55rem .85rem;background:var(--card);border:1px solid var(--border);border-radius:3px;margin-bottom:.55rem;}
.bsrank{font-family:var(--fd);font-size:.62rem;color:var(--muted);min-width:22px;}
.bstitle{flex:1;font-size:.88rem;font-weight:600;}
.bssold{font-family:var(--fd);font-size:.7rem;color:var(--cyan);}
.bsbar-w{width:70px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.bsbar{height:100%;background:linear-gradient(90deg,var(--cyan),var(--violet));border-radius:2px;}
.empty-h{text-align:center;padding:2.5rem;color:var(--muted);}
.clr-btn{padding:5px 12px;background:none;border:1px solid rgba(255,0,110,.25);color:var(--pink);font-family:var(--fd);font-size:.56rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;}
.clr-btn:hover{background:rgba(255,0,110,.07);}
.exp-btn{padding:5px 12px;background:none;border:1px solid rgba(0,245,255,.25);color:var(--cyan);font-family:var(--fd);font-size:.56rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;}
.exp-btn:hover{background:rgba(0,245,255,.07);}
.footer{border-top:1px solid var(--border);padding:2rem 1.5rem;margin-top:4rem;}
.footer-in{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:2rem;}
.flogo{font-family:var(--fd);font-size:1rem;letter-spacing:3px;background:linear-gradient(90deg,var(--cyan),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem;}
.flogo em{-webkit-text-fill-color:rgba(232,232,240,.35);font-style:normal;}
.ftag{font-size:.84rem;color:var(--muted);line-height:1.5;}
.fct{font-family:var(--fd);font-size:.56rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;}
.flinks{list-style:none;display:flex;flex-direction:column;gap:.4rem;}
.flinks li button{background:none;border:none;color:var(--muted);font-family:var(--fb);font-size:.87rem;cursor:pointer;text-align:left;}
.flinks li button:hover{color:var(--cyan);}
.fbot{max-width:1200px;margin:1.5rem auto 0;padding-top:1.5rem;border-top:1px solid var(--border);text-align:center;color:var(--muted);font-size:.76rem;}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--cyan);color:var(--cyan);font-family:var(--fd);font-size:.6rem;letter-spacing:2px;text-transform:uppercase;padding:10px 22px;border-radius:3px;z-index:9999;box-shadow:0 4px 24px rgba(0,245,255,.18);animation:tin .3s ease;white-space:nowrap;}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;color:var(--muted);}
.spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){
  .about-grid,.cgrid{grid-template-columns:1fr;}
  .about-art{display:none;}
  .agrid,.h2col{grid-template-columns:1fr;}
  .pgrid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr));}
  .cart-drw{width:100vw;}
  .header-search{display:none;}
  .hnav .ntab:not(.always){display:none;}
  .hmbg{display:flex;}
}
</style>
</head>

  const [successOpen,setSuccessOpen]=useState(false);
  const [lastOrder,setLastOrder]=useState(null);
  const [guestPhone,setGuestPhone]=useState("");
  const [adminAuth,setAdminAuth]=useState(false);
  const [adminTab,setAdminTab]=useState("catalog");
  const [adminCreds,setAdminCreds]=useState({u:"",p:""});
  const [adminErr,setAdminErr]=useState("");
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState({title:"",volume:"",price:"",stock:"",image:"",itab:"url"});
  const [waEdit,setWaEdit]=useState("");
  const [offerEditId,setOfferEditId]=useState(null);
  const [offerForm,setOfferForm]=useState({label:"",title:"",desc:"",icon:"",color:"#00f5ff"});
  const [comingEditId,setComingEditId]=useState(null);
  const [comingForm,setComingForm]=useState({label:"",title:"",desc:"",icon:"",color:"#ffaa00"});
  const [profileForm,setProfileForm]=useState({name:"",phone:""});
  const [editingProfile,setEditingProfile]=useState(false);
  const [contactForm,setContactForm]=useState({name:"",phone:"",msg:""});
  const toastRef=useRef(null);

  useEffect(()=>{
    setManga(lsGet(KEYS.manga,SEED_MANGA));
    setOrders(lsGet(KEYS.orders,[]));
    setWaNum(lsGet(KEYS.waNum,DEFAULT_WA));
    setProfile(lsGet(KEYS.profile,null));
    setOffers(lsGet(KEYS.offers,SEED_OFFERS));
    setComing(lsGet(KEYS.coming,SEED_COMING));
    const hb=lsGet(KEYS.heroBg,null);
    if(hb) setHeroBg(hb);
    setReady(true);
  },[]);

  const saveManga=useCallback(v=>{setManga(v);lsSet(KEYS.manga,v);},[]);
  const saveOrders=useCallback(v=>{setOrders(v);lsSet(KEYS.orders,v);},[]);
  const saveWaNum=useCallback(v=>{setWaNum(v);lsSet(KEYS.waNum,v);},[]);
  const saveProfile=useCallback(v=>{setProfile(v);lsSet(KEYS.profile,v);},[]);
  const saveOffers=useCallback(v=>{setOffers(v);lsSet(KEYS.offers,v);},[]);
  const saveComing=useCallback(v=>{setComing(v);lsSet(KEYS.coming,v);},[]);
  const saveHeroBg=useCallback(v=>{setHeroBg(v);lsSet(KEYS.heroBg,v);},[]);

  const toast_=msg=>{setToast(msg);clearTimeout(toastRef.current);toastRef.current=setTimeout(()=>setToast(null),2800);};
  const inr=n=>"₹"+Number(n).toLocaleString("en-IN");
  const navTo=p=>{setPage(p);setSearch("");setMobileNav(false);};
  const fmtWA=n=>n.length>=12?`+${n.slice(0,2)} ${n.slice(2,7)} ${n.slice(7)}`:`+${n}`;
  const filtered=manga.filter(m=>m.title.toLowerCase().includes(search.toLowerCase()));
  const cartCount=cart.reduce((s,i)=>s+i.qty,0);
  const cartTotal=cart.reduce((s,i)=>s+i.price*i.qty,0);

  const addToCart=m=>{
    setCart(prev=>{const ex=prev.find(i=>i.id===m.id);if(ex)return prev.map(i=>i.id===m.id?{...i,qty:i.qty+1}:i);return[...prev,{...m,qty:1}];});
    toast_(`Added — ${m.title} Vol.${m.volume}`);
  };
  const chgQty=(id,d)=>setCart(prev=>prev.map(i=>i.id===id?{...i,qty:Math.max(0,i.qty+d)}:i).filter(i=>i.qty>0));
  const remItem=id=>setCart(prev=>prev.filter(i=>i.id!==id));
  const openConfirm=()=>{if(!cart.length)return;setCartOpen(false);setConfirmOpen(true);};

  const sendOrder=()=>{
    const orderId="CM-"+Date.now().toString(36).toUpperCase().slice(-6);
    const orderTime=new Date().toLocaleString("en-IN",{dateStyle:"medium",timeStyle:"short"});
    const custName=profile?.name||"Guest";
    const custPhone=profile?.phone||guestPhone.replace(/\D/g,"");
    const snapItems=cart.map(i=>({...i}));
    const total=cartTotal;
    let storeMsg=`🛒 *New Order — ${orderId}*
📅 ${orderTime}

`;
    snapItems.forEach(i=>{storeMsg+=`• ${i.title} Vol.${i.volume} × ${i.qty} — ${inr(i.price*i.qty)}
`;});
    storeMsg+=`
*Total: ${inr(total)}*
👤 Customer: ${custName}${custPhone?` (+91 ${custPhone})`:""}

Please confirm availability. Thank you!`;
    window.open(`https://wa.me/${waNum}?text=${encodeURIComponent(storeMsg)}`,"_blank");
    if(custPhone&&custPhone.length===10){
      setTimeout(()=>{
        let rcpt=`✅ *Order Confirmed — Carbon Manga*

*Order ID:* ${orderId}
*Date & Time:* ${orderTime}

📦 *Your Order:*
`;
        snapItems.forEach(i=>{rcpt+=`• ${i.title} Vol.${i.volume} × ${i.qty} — ${inr(i.price*i.qty)}
`;});
        rcpt+=`
💰 *Total: ${inr(total)}*

Thank you for ordering from *Carbon Manga*! 📚
We'll reach out shortly to confirm stock and arrange delivery.

— *Carbon Manga Team*`;
        window.open(`https://wa.me/91${custPhone}?text=${encodeURIComponent(rcpt)}`,"_blank");
      },900);
    }
    const updatedManga=manga.map(m=>{const ci=cart.find(c=>c.id===m.id);return ci?{...m,stock:Math.max(0,m.stock-ci.qty)}:m;});
    saveManga(updatedManga);
    const entry={id:orderId,time:orderTime,customer:custName,phone:custPhone,items:snapItems,total};
    saveOrders([entry,...orders]);
    setLastOrder(entry);setConfirmOpen(false);setSuccessOpen(true);setCart([]);setGuestPhone("");
  };

  const adminLogin=()=>{
    if(adminCreds.u===ADMIN_USER&&adminCreds.p===ADMIN_PASS){setAdminAuth(true);setAdminErr("");clearForm();}
    else setAdminErr("Invalid credentials. Try again.");
  };
  const clearForm=()=>setForm({title:"",volume:"",price:"",stock:"",image:"",itab:"url"});
  const startEdit=m=>{setEditId(m.id);setForm({title:m.title,volume:m.volume,price:m.price,stock:m.stock,image:m.image,itab:"url"});};
  const fc=e=>setForm(f=>({...f,[e.target.name]:e.target.value}));
  const handleImgUpload=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>setForm(f=>({...f,image:ev.target.result}));r.readAsDataURL(file);};
  const saveMangaForm=()=>{
    if(!form.title||!form.volume||!form.price){toast_("Fill required fields");return;}
    let updated;
    if(editId!==null){updated=manga.map(m=>m.id===editId?{...m,...form,volume:+form.volume,price:+form.price,stock:+form.stock||0}:m);toast_("Updated!");}
    else{updated=[...manga,{id:Date.now(),...form,volume:+form.volume,price:+form.price,stock:+form.stock||0}];toast_("Added!");}
    saveManga(updated);setEditId(null);clearForm();
  };
  const deleteManga=id=>{saveManga(manga.filter(m=>m.id!==id));if(editId===id){setEditId(null);clearForm();}toast_("Deleted");};

  const clearOfferForm=()=>setOfferForm({label:"",title:"",desc:"",icon:"",color:"#00f5ff"});
  const startEditOffer=o=>{setOfferEditId(o.id);setOfferForm({label:o.label,title:o.title,desc:o.desc,icon:o.icon,color:o.color});};
  const saveOfferForm=()=>{
    if(!offerForm.title||!offerForm.label){toast_("Fill required fields");return;}
    let updated;
    if(offerEditId!==null){updated=offers.map(o=>o.id===offerEditId?{...o,...offerForm}:o);toast_("Offer updated!");}
    else{updated=[...offers,{id:Date.now(),...offerForm}];toast_("Offer added!");}
    saveOffers(updated);setOfferEditId(null);clearOfferForm();
  };
  const deleteOffer=id=>{saveOffers(offers.filter(o=>o.id!==id));if(offerEditId===id){setOfferEditId(null);clearOfferForm();}toast_("Deleted");};

  const clearComingForm=()=>setComingForm({label:"",title:"",desc:"",icon:"",color:"#ffaa00"});
  const startEditComing=c=>{setComingEditId(c.id);setComingForm({label:c.label,title:c.title,desc:c.desc,icon:c.icon,color:c.color});};
  const saveComingForm=()=>{
    if(!comingForm.title||!comingForm.label){toast_("Fill required fields");return;}
    let updated;
    if(comingEditId!==null){updated=coming.map(c=>c.id===comingEditId?{...c,...comingForm}:c);toast_("Updated!");}
    else{updated=[...coming,{id:Date.now(),...comingForm}];toast_("Added!");}
    saveComing(updated);setComingEditId(null);clearComingForm();
  };
  const deleteComing=id=>{saveComing(coming.filter(c=>c.id!==id));if(comingEditId===id){setComingEditId(null);clearComingForm();}toast_("Deleted");};

  const saveProf=()=>{
    if(!profileForm.name.trim()){toast_("Enter your name");return;}
    const ph=profileForm.phone.replace(/\D/g,"");
    if(ph.length!==10){toast_("Enter valid 10-digit number");return;}
    const p={name:profileForm.name.trim(),phone:ph,joined:new Date().toLocaleDateString("en-IN",{month:"long",year:"numeric"})};
    saveProfile(p);setEditingProfile(false);toast_("Profile saved!");
  };
  const contactWA=()=>{
    const msg=`Hi Carbon Manga!
Name: ${contactForm.name||"Customer"}${contactForm.phone?"
Phone: +91 "+contactForm.phone:""}

${contactForm.msg||"I have a query."}`;
    window.open(`https://wa.me/${waNum}?text=${encodeURIComponent(msg)}`,"_blank");
  };
  const exportHistory=()=>{
    let txt="CARBON MANGA — ORDER HISTORY
"+"=".repeat(40)+"

";
    orders.forEach(o=>{txt+=`Order: ${o.id}  |  ${o.time}  |  Customer: ${o.customer}${o.phone?` (+91 ${o.phone})`:""}
`;o.items.forEach(i=>{txt+=`  • ${i.title} Vol.${i.volume} × ${i.qty} — ${inr(i.price*i.qty)}
`;});txt+=`  Total: ${inr(o.total)}

`;});
    navigator.clipboard.writeText(txt).then(()=>toast_("History copied!")).catch(()=>toast_("Copy failed"));
  };

  const totalRev=orders.reduce((s,o)=>s+o.total,0);
  const totalUnits=orders.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.qty,0),0);
  const soldMap={};orders.forEach(o=>o.items.forEach(i=>{const k=`${i.title} Vol.${i.volume}`;soldMap[k]=(soldMap[k]||0)+i.qty;}));
  const bestsellers=Object.entries(soldMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxSold=bestsellers[0]?.[1]||1;
  const showFooter=["store","offers","about","contact"].includes(page);

  if(!ready)return(<div className="loading"><div className="spinner"/><span style={{fontFamily:"var(--fd)",fontSize:".65rem",letterSpacing:"3px",textTransform:"uppercase",color:"var(--muted)"}}>Loading Carbon Manga…</span></div>);

  return (
    <div>
      <div className="scanlines"/>

      {/* HEADER */}
      <header className="header">
        <div className="logo" onClick={()=>navTo("store")}>Carbon<em>◆</em>Manga</div>
        <div className="header-search">
          <span className="search-ico">🔍</span>
          <input className="search-inp" placeholder="Search manga titles…" value={search} onChange={e=>{setSearch(e.target.value);if(page!=="store")setPage("store");}}/>
          {search&&<button className="search-x" onClick={()=>setSearch("")}>✕</button>}
        </div>
        <nav className="hnav">
          {[["store","Store"],["offers","Offers"],["about","About"],["contact","Contact"]].map(([p,l])=>(
            <button key={p} className={`ntab ${page===p?"on":""}`} onClick={()=>navTo(p)}>{l}</button>
          ))}
          <button className={`ntab ${page==="profile"?"on":""}`} onClick={()=>navTo("profile")}>{profile?`👤 ${profile.name.split(" ")[0]}`:"Profile"}</button>
          <button className={`ntab ${page==="admin"?"on":""}`} onClick={()=>navTo("admin")}>Admin</button>
          <button className="cart-btn" onClick={()=>setCartOpen(true)}>🛍{cartCount>0&&<span className="cbadge">{cartCount}</span>}</button>
          <button className="hmbg" onClick={()=>setMobileNav(true)}>☰</button>
        </nav>
      </header>

      {/* MOBILE NAV */}
      <div className={`mobile-nav ${mobileNav?"open":""}`}>
        <button className="mobile-nav-close xbtn" onClick={()=>setMobileNav(false)}>✕</button>
        {[["store","Store"],["offers","Offers"],["about","About"],["contact","Contact"],["profile",profile?`👤 ${profile.name.split(" ")[0]}`:"Profile"],["admin","Admin"]].map(([p,l])=>(
          <button key={p} className={`ntab ${page===p?"on":""}`} onClick={()=>navTo(p)}>{l}</button>
        ))}
      </div>

      {/* STORE */}
      {page==="store"&&(
        <>
          {!search&&(
            <section className="hero" style={{backgroundImage:`url(${heroBg})`,backgroundSize:"cover",backgroundPosition:"center"}}>
              <div className="hero-tag">Affordable Manga Across India</div>
              <h1><span className="l1">CARBON</span><span className="l2">MANGA</span></h1>
              <p>Affordable manga for readers across India. Clear prints, durable binding, and fast delivery.</p>
              <button className="cta" onClick={()=>document.getElementById("col")?.scrollIntoView({behavior:"smooth"})}>▼ Browse Collection</button>
            </section>
          )}
          <div className="sec" id="col">
            <div className="shead">
              <span className="stitle">{search?`"${search}"` : "Collection"}</span>
              <div className="sline"/>
              <span className="scnt">{filtered.length} titles</span>
            </div>
            {filtered.length===0?(<div className="nores"><div style={{fontSize:"3rem",marginBottom:".5rem"}}>🔦</div><p>No manga found for "{search}"</p></div>):(
              <div className="pgrid">
                {filtered.map(m=>(
                  <div className="pcard" key={m.id}>
                    <div className="pimg">
                      <img src={m.image} alt={m.title} onError={e=>{e.target.src=`https://placehold.co/300x450/0f0f1a/00f5ff?text=Vol.${m.volume}`;}}/>
                      {m.stock<=0&&<div className="soldout-overlay"><span className="soldout-tag">Sold Out</span></div>}
                    </div>
                    <div className="pbody">
                      <div className="pvol">VOL. {m.volume}</div>
                      <div className="ptitle">{m.title}</div>
                      <div className="pfooter">
                        <span className="pprice">{inr(m.price)}</span>
                        <span className={`pstock ${m.stock>0&&m.stock<=5?"low":""}`}>{m.stock>0?(m.stock<=5?`${m.stock} left`:"In Stock"):""}</span>
                      </div>
                      <button className="addbtn" disabled={m.stock<=0} onClick={()=>addToCart(m)}>{m.stock>0?"+ Add to Cart":"Unavailable"}</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </>
      )}

      {/* OFFERS */}
      {page==="offers"&&(
        <div className="sec">
          <div className="shead"><span className="stitle">Current Offers</span><div className="sline"/><span className="scnt">{offers.length} deals</span></div>
          <div className="ogrid">
            {offers.map(o=>(
              <div className="ocard" key={o.id} style={{borderColor:o.color+"28"}}>
                <span className="oicon">{o.icon}</span>
                <div className="olabel" style={{color:o.color}}>{o.label}</div>
                <div className="otitle">{o.title}</div>
                <div className="odesc">{o.desc}</div>
                <div className="oglow" style={{background:o.color}}/>
              </div>
            ))}
          </div>
          <div style={{marginTop:"2.5rem",textAlign:"center"}}>
            <p style={{color:"var(--muted)",fontSize:".9rem",marginBottom:"1.25rem"}}>Mention the deal name when you send your WhatsApp order!</p>
            <button className="cta" onClick={()=>navTo("store")}>Shop Now →</button>
          </div>
          <div style={{marginTop:"3rem"}}>
            <div className="shead"><span className="stitle" style={{color:"var(--gold)"}}>Coming Soon</span><div className="sline"/><span className="scnt" style={{color:"var(--gold)"}}>dropping next</span></div>
            <div className="ogrid">
              {coming.map((c,i)=>(
                <div key={c.id||i} className="ocard" style={{borderColor:c.color+"28",opacity:.88}}>
                  <span className="oicon">{c.icon}</span>
                  <div className="olabel" style={{color:c.color}}>{c.label}</div>
                  <div className="otitle">{c.title}</div>
                  <div className="odesc">{c.desc}</div>
                  <div style={{marginTop:".9rem",display:"inline-block",fontFamily:"var(--fd)",fontSize:".52rem",letterSpacing:"3px",textTransform:"uppercase",color:c.color,border:`1px solid ${c.color}40`,padding:"3px 10px",borderRadius:"2px"}}>Coming Soon</div>
                  <div className="oglow" style={{background:c.color}}/>
                </div>
              ))}
            </div>
            <p style={{color:"var(--muted)",fontSize:".82rem",textAlign:"center",marginTop:"1.5rem"}}>Want early access? <button onClick={()=>navTo("contact")} style={{background:"none",border:"none",color:"var(--cyan)",fontFamily:"var(--fb)",fontSize:".82rem",cursor:"pointer",textDecoration:"underline"}}>Message us on WhatsApp</button></p>
          </div>
        </div>
      )}

      {/* ABOUT */}
      {page==="about"&&(
        <div className="sec">
          <div className="about-grid">
            <div className="about-art">📖</div>
            <div>
              <div className="about-label">Our Story</div>
              <div className="about-h">We Live and Breathe <span>Manga</span></div>
              <p className="about-p">Carbon Manga was born out of a single obsession — finding authentic, high-quality manga volumes in India without the hassle. We're a passionate team of anime fans who got tired of overpriced imports and sketchy editions.</p>
              <p className="about-p">We source directly and deliver genuine volumes right to your door across India. Every manga is verified authentic. Orders are handled personally via WhatsApp — you always deal with a real human, never a bot.</p>
              <div className="stats-row">
                <div className="stat"><div className="stat-v">500+</div><div className="stat-l">Orders Delivered</div></div>
                <div className="stat"><div className="stat-v">100%</div><div className="stat-l">Authentic</div></div>
                <div className="stat"><div className="stat-v">2022</div><div className="stat-l">Founded</div></div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* CONTACT */}
      {page==="contact"&&(
        <div className="sec">
          <div className="shead"><span className="stitle">Contact Us</span><div className="sline"/></div>
          <div className="cgrid">
            <div className="cinfo">
              {[{icon:"📲",label:"WhatsApp",val:fmtWA(waNum)},{icon:"📧",label:"Email",val:"hello@carbonmanga.in"},{icon:"📍",label:"Location",val:"India — Ships Nationwide"},{icon:"🕐",label:"Hours",val:"Mon–Sat, 10 AM – 8 PM IST"}].map((c,i)=>(
                <div className="citem" key={i}><span className="cicon2">{c.icon}</span><div><div className="clabel">{c.label}</div><div className="cval">{c.val}</div></div></div>
              ))}
            </div>
            <div className="cform">
              <div style={{fontFamily:"var(--fd)",fontSize:".68rem",letterSpacing:"3px",textTransform:"uppercase",color:"var(--cyan)",marginBottom:"1.25rem"}}>◈ Send a Message</div>
              <div className="fg"><label className="fl">Your Name</label><input className="fi" placeholder="Arjun Sharma" value={contactForm.name} onChange={e=>setContactForm(f=>({...f,name:e.target.value}))}/></div>
              <div className="fg"><label className="fl">Phone Number</label><div className="ph-wrap"><span className="ph-pre">+91</span><input className="fi" placeholder="9876543210" maxLength={10} value={contactForm.phone} onChange={e=>setContactForm(f=>({...f,phone:e.target.value.replace(/\D/g,"")}))} /></div></div>
              <div className="fg"><label className="fl">Message</label><textarea className="fi" placeholder="Ask about a volume, availability, or anything!" value={contactForm.msg} onChange={e=>setContactForm(f=>({...f,msg:e.target.value}))}/></div>
              <button className="wa-btn-g" onClick={contactWA}><span>📲</span> Send via WhatsApp</button>
            </div>
          </div>
        </div>
      )}

      {/* PROFILE */}
      {page==="profile"&&(
        <div className="sec">
          <div className="shead"><span className="stitle">Your Profile</span><div className="sline"/></div>
          {profile&&!editingProfile?(
            <div className="prof-wrap">
              <div className="prof-card">
                <div className="prof-banner"><div className="prof-av-wrap"><div className="prof-av">{profile.name.charAt(0)}</div></div></div>
                <div className="prof-body">
                  <div className="prof-name">{profile.name}</div>
                  <div className="prof-ph">+91 {profile.phone.replace(/(\d{5})(\d{5})/,"$1 $2")}</div>
                  <div className="prof-since">◈ Member since {profile.joined}</div>
                  <div className="prof-acts">
                    <button className="prof-btn" onClick={()=>{setProfileForm({name:profile.name,phone:profile.phone});setEditingProfile(true);}}>Edit Profile</button>
                    <button className="prof-btn danger" onClick={()=>{saveProfile(null);toast_("Profile removed");}}>Remove</button>
                  </div>
                </div>
              </div>
            </div>
          ):(
            <div className="prof-wrap">
              <div className="aform">
                <div className="ftitle">{editingProfile?"◈ Edit Your Profile":"◈ Create Your Profile"}</div>
                <div className="fg"><label className="fl">Full Name *</label><input className="fi" placeholder="e.g. Arjun Sharma" value={profileForm.name} onChange={e=>setProfileForm(f=>({...f,name:e.target.value}))}/></div>
                <div className="fg"><label className="fl">Indian Mobile Number *</label><div className="ph-wrap"><span className="ph-pre">+91</span><input className="fi" placeholder="10-digit number" maxLength={10} value={profileForm.phone} onChange={e=>setProfileForm(f=>({...f,phone:e.target.value.replace(/\D/g,"")}))} /></div></div>
                <button className="fsub" onClick={saveProf}>{editingProfile?"Save Changes":"Create Profile"}</button>
                {editingProfile&&<button className="fcan" onClick={()=>setEditingProfile(false)}>Cancel</button>}
              </div>
            </div>
          )}
        </div>
      )}

      {/* ADMIN */}
      {page==="admin"&&(
        !adminAuth?(
          <div className="admin-login">
            <div className="admin-card">
              <div className="admin-login-title">◈ Admin Access</div>
              <div className="fg"><label className="fl">Username</label><input className="fi" placeholder="Username" value={adminCreds.u} onChange={e=>setAdminCreds(c=>({...c,u:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&adminLogin()}/></div>
              <div className="fg"><label className="fl">Password</label><input className="fi" type="password" placeholder="Password" value={adminCreds.p} onChange={e=>setAdminCreds(c=>({...c,p:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&adminLogin()}/></div>
              {adminErr&&<p style={{color:"var(--pink)",fontSize:".8rem",marginBottom:".75rem"}}>{adminErr}</p>}
              <button className="fsub" onClick={adminLogin}>Login</button>
            </div>
          </div>
        ):(
          <div className="admin-wrap">
            <div className="admin-top">
              <div><div className="admin-ttl">Admin Panel</div><div className="admin-who">Logged in as <span>{ADMIN_USER}</span></div></div>
              <div className="admin-top-r">
                {[["catalog","📦 Catalog"],["offers","🏷️ Offers"],["coming","🔜 Coming Soon"],["history","📊 History"]].map(([t,l])=>(
                  <button key={t} className={`atab ${adminTab===t?"on":""}`} onClick={()=>setAdminTab(t)}>{l}</button>
                ))}
                <button className="a-logout" onClick={()=>{setAdminAuth(false);setAdminCreds({u:"",p:""});}}>Logout</button>
              </div>
            </div>

            {/* WA + HERO BG — shown in catalog tab */}
            {adminTab==="catalog"&&(
              <>
                <div className="wa-panel">
                  <div className="wa-ptitle">📲 WhatsApp Order Number</div>
                  <div className="wa-cur">Orders go to: <span>{fmtWA(waNum)}</span></div>
                  <div className="wa-row">
                    <div className="fg"><label className="fl">Update Number (country code, no +)</label>
                      <div className="ph-wrap"><span className="ph-pre">+</span><input className="fi" placeholder="917307259825" maxLength={15} value={waEdit} onChange={e=>setWaEdit(e.target.value.replace(/\D/g,""))}/></div>
                    </div>
                    <button className="wa-save" onClick={()=>{if(waEdit.length>=10){saveWaNum(waEdit);setWaEdit("");toast_("WA number updated!");}else toast_("Enter a valid number");}}>Save</button>
                  </div>
                </div>
                <div style={{background:"var(--card)",border:"1px solid rgba(0,245,255,.2)",borderRadius:4,padding:"1.25rem",marginBottom:"1.75rem"}}>
                  <div style={{fontFamily:"var(--fd)",fontSize:".62rem",letterSpacing:"3px",textTransform:"uppercase",color:"var(--cyan)",marginBottom:"1rem"}}>🖼️ Homepage Hero Background</div>
                  <div style={{display:"flex",gap:"1rem",alignItems:"flex-start",flexWrap:"wrap"}}>
                    <img src={heroBg} alt="hero bg" style={{width:180,height:90,objectFit:"cover",borderRadius:3,border:"1px solid var(--border)",flexShrink:0}}/>
                    <div style={{flex:1,minWidth:200}}>
                      <div style={{fontSize:".8rem",color:"var(--muted)",marginBottom:".75rem"}}>Upload a new background image for the homepage hero section.</div>
                      <label style={{display:"inline-flex",alignItems:"center",gap:8,padding:"8px 16px",background:"rgba(0,245,255,.08)",border:"1px solid rgba(0,245,255,.3)",color:"var(--cyan)",fontFamily:"var(--fd)",fontSize:".6rem",letterSpacing:"2px",textTransform:"uppercase",cursor:"pointer",borderRadius:2}}>
                        📁 Upload New Image
                        <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{saveHeroBg(ev.target.result);toast_("Hero background updated!");};r.readAsDataURL(file);}}/>
                      </label>
                      <button onClick={()=>{saveHeroBg(SEED_HERO_BG);toast_("Reset to default!");}} style={{marginLeft:8,padding:"8px 14px",background:"none",border:"1px solid var(--border)",color:"var(--muted)",fontFamily:"var(--fd)",fontSize:".6rem",letterSpacing:"2px",textTransform:"uppercase",cursor:"pointer",borderRadius:2}}>Reset Default</button>
                    </div>
                  </div>
                </div>
              </>
            )}

            {/* CATALOG */}
            {adminTab==="catalog"&&(
              <div className="agrid">
                <div className="atbl-wrap">
                  <table className="atbl">
                    <thead><tr><th>Cover</th><th>Title</th><th>Vol</th><th>Price</th><th>Stock</th><th>Actions</th></tr></thead>
                    <tbody>
                      {manga.map(m=>(
                        <tr key={m.id}>
                          <td><img style={{width:32,height:46,objectFit:"cover",borderRadius:2}} src={m.image} alt={m.title} onError={e=>{e.target.src="https://placehold.co/32x46/0f0f1a/00f5ff?text=M";}}/></td>
                          <td style={{fontWeight:600}}>{m.title}</td>
                          <td style={{fontFamily:"var(--fd)",color:"var(--violet)",fontSize:".73rem"}}>{m.volume}</td>
                          <td style={{fontFamily:"var(--fd)",color:"var(--cyan)"}}>{inr(m.price)}</td>
                          <td><span className={`sbadge ${m.stock>0?"in":"out"}`}>{m.stock>0?m.stock:"Out"}</span></td>
                          <td><button className="ta edit" onClick={()=>startEdit(m)}>Edit</button><button className="ta del" onClick={()=>deleteManga(m.id)}>Del</button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div className="aform">
                  <div className="ftitle">{editId!==null?"◈ Edit Manga":"◈ Add New Manga"}</div>
                  <div className="fg"><label className="fl">Title *</label><input className="fi" name="title" value={form.title} onChange={fc} placeholder="e.g. Chainsaw Man"/></div>
                  <div className="fr2">
                    <div className="fg"><label className="fl">Volume *</label><input className="fi" name="volume" type="number" value={form.volume} onChange={fc} placeholder="1"/></div>
                    <div className="fg"><label className="fl">Price (₹) *</label><input className="fi" name="price" type="number" value={form.price} onChange={fc} placeholder="749"/></div>
                  </div>
                  <div className="fg"><label className="fl">Stock</label><input className="fi" name="stock" type="number" value={form.stock} onChange={fc} placeholder="0 = sold out"/></div>
                  <div className="fg">
                    <label className="fl">Cover Image</label>
                    <div className="itabs"><button className={`itab ${form.itab==="url"?"on":""}`} onClick={()=>setForm(f=>({...f,itab:"url"}))}>URL</button><button className={`itab ${form.itab==="upload"?"on":""}`} onClick={()=>setForm(f=>({...f,itab:"upload"}))}>Upload</button></div>
                    {form.itab==="url"?<input className="fi" name="image" value={form.image} onChange={fc} placeholder="https://…"/>:(
                      <div className="iupload"><input type="file" accept="image/*" onChange={handleImgUpload}/>{form.image?<img className="iprev" src={form.image} alt="preview"/>:<div className="iph"><span>🖼️</span>Click to upload</div>}</div>
                    )}
                    {form.image&&<button className="fcan" style={{marginTop:6}} onClick={()=>setForm(f=>({...f,image:""}))}>Clear Image</button>}
                  </div>
                  <button className="fsub" onClick={saveMangaForm}>{editId!==null?"Save Changes":"Add Manga"}</button>
                  {editId!==null&&<button className="fcan" onClick={()=>{setEditId(null);clearForm();}}>Cancel Edit</button>}
                </div>
              </div>
            )}

            {/* OFFERS TAB */}
            {adminTab==="offers"&&(
              <div className="agrid">
                <div className="atbl-wrap">
                  <table className="atbl">
                    <thead><tr><th>Icon</th><th>Label</th><th>Title</th><th>Color</th><th>Actions</th></tr></thead>
                    <tbody>
                      {offers.map(o=>(
                        <tr key={o.id}>
                          <td style={{fontSize:"1.3rem"}}>{o.icon}</td>
                          <td><span style={{fontFamily:"var(--fd)",fontSize:".65rem",color:o.color,letterSpacing:"1px"}}>{o.label}</span></td>
                          <td style={{fontWeight:600}}>{o.title}</td>
                          <td><span style={{display:"inline-block",width:16,height:16,borderRadius:"50%",background:o.color,verticalAlign:"middle",border:"2px solid rgba(255,255,255,.15)"}}/></td>
                          <td><button className="ta edit" onClick={()=>startEditOffer(o)}>Edit</button><button className="ta del" onClick={()=>deleteOffer(o.id)}>Del</button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div className="aform">
                  <div className="ftitle">{offerEditId!==null?"◈ Edit Offer":"◈ Add New Offer"}</div>
                  <div className="fr2">
                    <div className="fg"><label className="fl">Icon *</label><input className="fi" placeholder="📚" value={offerForm.icon} onChange={e=>setOfferForm(f=>({...f,icon:e.target.value}))}/></div>
                    <div className="fg"><label className="fl">Label *</label><input className="fi" placeholder="FLASH SALE" value={offerForm.label} onChange={e=>setOfferForm(f=>({...f,label:e.target.value}))}/></div>
                  </div>
                  <div className="fg"><label className="fl">Title *</label><input className="fi" placeholder="Weekend 15% Off" value={offerForm.title} onChange={e=>setOfferForm(f=>({...f,title:e.target.value}))}/></div>
                  <div className="fg"><label className="fl">Description</label><textarea className="fi" placeholder="Details…" value={offerForm.desc} onChange={e=>setOfferForm(f=>({...f,desc:e.target.value}))}/></div>
                  <div className="fg"><label className="fl">Accent Color</label>
                    <div style={{display:"flex",gap:".5rem",alignItems:"center"}}>
                      <input type="color" value={offerForm.color} onChange={e=>setOfferForm(f=>({...f,color:e.target.value}))} style={{width:40,height:36,border:"1px solid var(--border)",background:"none",cursor:"pointer",borderRadius:2,padding:2}}/>
                      <input className="fi" value={offerForm.color} onChange={e=>setOfferForm(f=>({...f,color:e.target.value}))} style={{flex:1}}/>
                    </div>
                  </div>
                  <button className="fsub" onClick={saveOfferForm}>{offerEditId!==null?"Save Changes":"Add Offer"}</button>
                  {offerEditId!==null&&<button className="fcan" onClick={()=>{setOfferEditId(null);clearOfferForm();}}>Cancel</button>}
                </div>
              </div>
            )}

            {/* COMING SOON TAB */}
            {adminTab==="coming"&&(
              <div className="agrid">
                <div className="atbl-wrap">
                  <table className="atbl">
                    <thead><tr><th>Icon</th><th>Label</th><th>Title</th><th>Color</th><th>Actions</th></tr></thead>
                    <tbody>
                      {coming.map(c=>(
                        <tr key={c.id}>
                          <td style={{fontSize:"1.3rem"}}>{c.icon}</td>
                          <td><span style={{fontFamily:"var(--fd)",fontSize:".65rem",color:c.color,letterSpacing:"1px"}}>{c.label}</span></td>
                          <td style={{fontWeight:600}}>{c.title}</td>
                          <td><span style={{display:"inline-block",width:16,height:16,borderRadius:"50%",background:c.color,verticalAlign:"middle",border:"2px solid rgba(255,255,255,.15)"}}/></td>
                          <td><button className="ta edit" onClick={()=>startEditComing(c)}>Edit</button><button className="ta del" onClick={()=>deleteComing(c.id)}>Del</button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div className="aform">
                  <div className="ftitle">{comingEditId!==null?"◈ Edit Coming Soon":"◈ Add Coming Soon"}</div>
                  <div className="fr2">
                    <div className="fg"><label className="fl">Icon *</label><input className="fi" placeholder="🎌" value={comingForm.icon} onChange={e=>setComingForm(f=>({...f,icon:e.target.value}))}/></div>
                    <div className="fg"><label className="fl">Label *</label><input className="fi" placeholder="NEW SERIES" value={comingForm.label} onChange={e=>setComingForm(f=>({...f,label:e.target.value}))}/></div>
                  </div>
                  <div className="fg"><label className="fl">Title *</label><input className="fi" placeholder="Vinland Saga" value={comingForm.title} onChange={e=>setComingForm(f=>({...f,title:e.target.value}))}/></div>
                  <div className="fg"><label className="fl">Description</label><textarea className="fi" placeholder="Details…" value={comingForm.desc} onChange={e=>setComingForm(f=>({...f,desc:e.target.value}))}/></div>
                  <div className="fg"><label className="fl">Accent Color</label>
                    <div style={{display:"flex",gap:".5rem",alignItems:"center"}}>
                      <input type="color" value={comingForm.color} onChange={e=>setComingForm(f=>({...f,color:e.target.value}))} style={{width:40,height:36,border:"1px solid var(--border)",background:"none",cursor:"pointer",borderRadius:2,padding:2}}/>
                      <input className="fi" value={comingForm.color} onChange={e=>setComingForm(f=>({...f,color:e.target.value}))} style={{flex:1}}/>
                    </div>
                  </div>
                  <button className="fsub" onClick={saveComingForm}>{comingEditId!==null?"Save Changes":"Add Item"}</button>
                  {comingEditId!==null&&<button className="fcan" onClick={()=>{setComingEditId(null);clearComingForm();}}>Cancel</button>}
                </div>
              </div>
            )}

            {/* HISTORY TAB */}
            {adminTab==="history"&&(
              <div>
                <div className="hstats">
                  <div className="hstat"><div className="hstat-v" style={{color:"var(--cyan)"}}>{orders.length}</div><div className="hstat-l">Total Orders</div></div>
                  <div className="hstat"><div className="hstat-v" style={{color:"var(--violet)"}}>{inr(totalRev)}</div><div className="hstat-l">Total Revenue</div></div>
                  <div className="hstat"><div className="hstat-v" style={{color:"var(--gold)"}}>{totalUnits}</div><div className="hstat-l">Units Sold</div></div>
                  <div className="hstat"><div className="hstat-v" style={{color:"var(--pink)"}}>{orders.length>0?inr(Math.round(totalRev/orders.length)):"—"}</div><div className="hstat-l">Avg Order Value</div></div>
                </div>
                <div className="h2col">
                  <div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem",flexWrap:"wrap",gap:".5rem"}}>
                      <span style={{fontFamily:"var(--fd)",fontSize:".65rem",letterSpacing:"3px",textTransform:"uppercase",color:"var(--cyan)"}}>Order Log</span>
                      <div style={{display:"flex",gap:".5rem"}}>
                        {orders.length>0&&<><button className="exp-btn" onClick={exportHistory}>Copy Export</button><button className="clr-btn" onClick={()=>{if(window.confirm("Clear all order history?"))saveOrders([]);}}>Clear</button></>}
                      </div>
                    </div>
                    {orders.length===0?(<div className="empty-h"><div style={{fontSize:"2.5rem",marginBottom:".5rem"}}>📋</div><p>No orders yet.</p></div>):
                      orders.map(o=>(
                        <div className="ocrd" key={o.id}>
                          <div className="ocrd-hd">
                            <div><div className="oid">{o.id}</div><div className="otime">{o.time}</div></div>
                            <div style={{textAlign:"right"}}><div style={{fontSize:".8rem",color:"var(--text)"}}>👤 {o.customer}{o.phone?` · +91 ${o.phone}`:""}</div><div className="otbadge">{inr(o.total)}</div></div>
                          </div>
                          <div className="olitems">
                            {o.items.map((item,idx)=>(
                              <div className="oirow" key={idx}>
                                <span>{item.title} <span style={{color:"var(--violet)",fontFamily:"var(--fd)",fontSize:".63rem"}}>Vol.{item.volume}</span></span>
                                <span style={{color:"var(--muted)",fontSize:".73rem"}}>× {item.qty}</span>
                                <span style={{fontFamily:"var(--fd)",fontSize:".73rem",color:"var(--cyan)"}}>{inr(item.price*item.qty)}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      ))
                    }
                  </div>
                  <div>
                    <div style={{fontFamily:"var(--fd)",fontSize:".65rem",letterSpacing:"3px",textTransform:"uppercase",color:"var(--violet)",marginBottom:"1rem"}}>Top Selling Volumes</div>
                    {bestsellers.length===0?(<div className="empty-h"><div style={{fontSize:"2rem",marginBottom:".5rem"}}>📊</div><p>No sales data yet.</p></div>):
                      bestsellers.map(([name,qty],idx)=>(
                        <div className="bsrow" key={name}>
                          <span className="bsrank">#{idx+1}</span>
                          <span className="bstitle">{name}</span>
                          <span className="bssold">{qty} sold</span>
                          <div className="bsbar-w"><div className="bsbar" style={{width:`${(qty/maxSold)*100}%`}}/></div>
                        </div>
                      ))
                    }
                    <div style={{fontFamily:"var(--fd)",fontSize:".65rem",letterSpacing:"3px",textTransform:"uppercase",color:"var(--gold)",margin:"1.5rem 0 1rem"}}>Live Stock</div>
                    {manga.map(m=>(
                      <div key={m.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:".5rem .75rem",background:"var(--card)",border:"1px solid var(--border)",borderRadius:3,marginBottom:".5rem",fontSize:".84rem"}}>
                        <span style={{fontWeight:600}}>{m.title} <span style={{color:"var(--violet)",fontFamily:"var(--fd)",fontSize:".63rem"}}>Vol.{m.volume}</span></span>
                        <span className={`sbadge ${m.stock>0?"in":"out"}`}>{m.stock>0?`${m.stock} left`:"Out"}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>
        )
      )}

      {/* CART DRAWER */}
      <div className={`cart-ov ${cartOpen?"open":""}`} onClick={()=>setCartOpen(false)}/>
      <div className={`cart-drw ${cartOpen?"open":""}`}>
        <div className="drw-hd"><span className="drw-title">Your Cart ({cartCount})</span><button className="xbtn" onClick={()=>setCartOpen(false)}>✕</button></div>
        <div className="cart-list">
          {cart.length===0?(<div className="cart-empty"><div style={{fontSize:"2.5rem",marginBottom:".5rem"}}>📭</div><p style={{fontSize:".88rem"}}>Cart is empty.</p></div>):
            cart.map(item=>(
              <div className="citem-row" key={item.id}>
                <img className="cimg" src={item.image} alt={item.title} onError={e=>{e.target.src="https://placehold.co/46x64/0f0f1a/00f5ff?text=M";}}/>
                <div className="cinfo2b">
                  <div className="cname">{item.title}</div>
                  <div className="cvol">Vol. {item.volume}</div>
                  <div className="cprice">{inr(item.price*item.qty)}</div>
                  <div className="cqty">
                    <button className="qbtn" onClick={()=>chgQty(item.id,-1)}>−</button>
                    <span className="qval">{item.qty}</span>
                    <button className="qbtn" onClick={()=>chgQty(item.id,1)}>+</button>
                  </div>
                </div>
                <button className="cremove" onClick={()=>remItem(item.id)}>✕</button>
              </div>
            ))
          }
        </div>
        <div className="cart-ft">
          <div className="cart-total-row"><span className="cart-tlabel">Total</span><span className="cart-tval">{inr(cartTotal)}</span></div>
          <button className="order-btn" disabled={cart.length===0} onClick={openConfirm}><span>📲</span> Order via WhatsApp</button>
        </div>
      </div>

      {/* CONFIRM MODAL */}
      {confirmOpen&&(
        <div className="modal-ov" onClick={e=>{if(e.target.classList.contains("modal-ov"))setConfirmOpen(false);}}>
          <div className="modal">
            <div className="mhd"><span className="mtitle">◈ Confirm Your Order</span><button className="xbtn" onClick={()=>setConfirmOpen(false)}>✕</button></div>
            <div className="mbody">
              <div className="mlist">
                {cart.map(item=>(
                  <div className="mrow" key={item.id}>
                    <span>{item.title} <span style={{color:"var(--violet)",fontFamily:"var(--fd)",fontSize:".68rem"}}>Vol.{item.volume}</span> × {item.qty}</span>
                    <span className="mpr">{inr(item.price*item.qty)}</span>
                  </div>
                ))}
              </div>
              <div className="mtotal"><span className="mtlabel">Order Total</span><span className="mtval">{inr(cartTotal)}</span></div>
              {profile?(
                <div className="mcust">👤 <span style={{color:"var(--violet)",fontFamily:"var(--fd)",fontSize:".68rem"}}>{profile.name}</span>&nbsp;·&nbsp;+91 {profile.phone.replace(/(\d{5})(\d{5})/,"$1 $2")}&nbsp;<span style={{color:"var(--green)",fontSize:".7rem"}}>✓ receipt will be sent</span></div>
              ):(
                <div className="fg" style={{marginBottom:".85rem"}}>
                  <label className="fl">📲 Your WhatsApp number (optional — receive receipt)</label>
                  <div className="ph-wrap"><span className="ph-pre">+91</span><input className="fi" placeholder="10-digit number" maxLength={10} value={guestPhone} onChange={e=>setGuestPhone(e.target.value.replace(/\D/g,""))}/></div>
                </div>
              )}
              <div style={{display:"flex",alignItems:"center",gap:".5rem",fontSize:".76rem",color:"var(--muted)",marginBottom:".85rem"}}>📲 Goes to store:&nbsp;<span style={{color:"var(--green)",fontFamily:"var(--fd)",fontSize:".66rem"}}>{fmtWA(waNum)}</span></div>
              <div className="minfo-box">✅ On confirm: WhatsApp opens for your order. If you entered your number, a 2nd window opens with your receipt. Stock auto-updates.</div>
              <div className="macts">
                <button className="mback" onClick={()=>{setConfirmOpen(false);setCartOpen(true);}}>← Back</button>
                <button className="mconfirm" onClick={sendOrder}><span>📲</span> Confirm & Send Order</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* SUCCESS MODAL */}
      {successOpen&&lastOrder&&(
        <div className="modal-ov" onClick={e=>{if(e.target.classList.contains("modal-ov"))setSuccessOpen(false);}}>
          <div className="modal">
            <div className="mhd"><span className="mtitle">◈ Order Placed!</span><button className="xbtn" onClick={()=>setSuccessOpen(false)}>✕</button></div>
            <div className="success-modal">
              <div className="success-icon">✅</div>
              <div className="success-title">Order Confirmed!</div>
              <div className="success-id">{lastOrder.id}</div>
              <div className="success-msg">Your order has been sent to Carbon Manga via WhatsApp.</div>
              <div className="success-steps">
                <div className="step-row"><span className="step-num">1</span><span>Your order message opened in WhatsApp — tap <strong>Send</strong>.</span></div>
                {lastOrder.phone&&<div className="step-row"><span className="step-num">2</span><span>A receipt window opened to your number — tap <strong>Send</strong> to save it.</span></div>}
                <div className="step-row"><span className="step-num">{lastOrder.phone?3:2}</span><span>The store will confirm and arrange delivery.</span></div>
                <div className="step-row"><span className="step-num">{lastOrder.phone?4:3}</span><span>Stock has been automatically updated.</span></div>
              </div>
              <button className="success-done" onClick={()=>{setSuccessOpen(false);navTo("store");}}>Back to Store →</button>
            </div>
          </div>
        </div>
      )}

      {/* FOOTER */}
      {showFooter&&(
        <footer className="footer">
          <div className="footer-in">
            <div><div className="flogo">Carbon<em>◆</em>Manga</div><div className="ftag">India's affordable manga store. Authentic volumes, delivered to your door.</div></div>
            <div><div className="fct">Navigate</div><ul className="flinks">{[["store","Store"],["offers","Offers"],["about","About Us"],["contact","Contact"],["profile","My Profile"]].map(([p,l])=><li key={p}><button onClick={()=>navTo(p)}>{l}</button></li>)}</ul></div>
            <div><div className="fct">Quick Links</div><ul className="flinks"><li><button onClick={()=>navTo("offers")}>Current Deals</button></li><li><button onClick={()=>navTo("contact")}>WhatsApp Us</button></li><li><button onClick={()=>navTo("about")}>Our Story</button></li></ul></div>
          </div>
          <div className="fbot">© 2025 Carbon Manga · All volumes authentic · Orders via WhatsApp · {fmtWA(waNum)}</div>
        </footer>
      )}

      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
